<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加班调休统计 </title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/icons/icon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto p-4">
        <!-- 主页视图 -->
        <div id="main-view">
            <header id="stats-container" class="mb-6"></header>

            <section class="bg-white rounded-xl p-4 shadow-sm mb-6">
                <div class="flex border-b mb-4">
                    <button id="tab-ot" class="flex-1 pb-2 border-b-2 border-indigo-600">加班录入</button>
                    <button id="tab-off" class="flex-1 pb-2 text-gray-400">调休核销</button>
                </div>
                <div id="form-content"></div>
            </section>

            <section>
                <h3 class="text-gray-500 text-sm font-bold mb-3">最近记录</h3>
                <!-- 仅展示最近2条 -->
                <div id="record-list-preview" class="space-y-3"></div>

                <!-- 查看更多按钮 -->
                <div class="mt-3 text-center">
                    <button id="btn-view-history"
                        class="text-gray-400 text-xs hover:text-indigo-600 transition-colors py-2 px-4">查看历史记录
                        ▾</button>
                </div>
            </section>
        </div>

        <!-- 历史记录视图 (默认隐藏) -->
        <div id="history-view" class="hidden">
            <div class="flex items-center mb-6">
                <button id="btn-back-home" class="mr-4 text-gray-600 hover:text-indigo-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <h2 id="history-title" class="text-lg font-bold text-gray-800">全部记录</h2>
            </div>

            <!-- 搜索/筛选区 (预留) -->

            <!-- 完整列表 -->
            <div id="record-list-full" class="space-y-3 pb-10"></div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="app.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("sw.js").then(function (reg) {
                    reg.addEventListener("updatefound", function () {
                        var sw = reg.installing;
                        sw.addEventListener("statechange", function () {
                            if (sw.state === "installed" && navigator.serviceWorker.controller) {
                                var banner = document.createElement("div");
                                banner.className = "fixed bottom-0 left-0 right-0 bg-indigo-600 text-white p-3 text-center text-sm z-50";
                                banner.innerHTML = '应用已更新 <a href="#" onclick="location.reload()" class="underline ml-2">点击刷新</a>';
                                document.body.appendChild(banner);
                            }
                        });
                    });
                });
            });
            navigator.serviceWorker.addEventListener("message", function (e) {
                if (e.data && e.data.type === "sync" && window.API && API.syncPendingOps) {
                    API.syncPendingOps();
                }
            });
        }
        window.addEventListener("online", function () {
            if (window.API && API.syncPendingOps) API.syncPendingOps();
        });
    </script>
</body>

</html>
