<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>加班调休统计</title>
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/icons/icon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="assets/icons/icon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="offline-banner">网络已断开，操作将在恢复后自动同步</div>

<div id="app">
    <header id="app-header">
        <h1>加班调休统计</h1>
        <div id="sync-status"></div>
    </header>

    <main id="main-content">
        <section id="view-add" class="view active">
            <form id="ot-form">
                <div class="form-group">
                    <label class="form-label" for="ot-date">加班日期</label>
                    <input type="date" id="ot-date" class="form-input" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="ot-start">开始时间</label>
                        <input type="time" id="ot-start" value="17:00" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="ot-end">结束时间</label>
                        <input type="time" id="ot-end" class="form-input" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="ot-memo">备注</label>
                    <input type="text" id="ot-memo" class="form-input" placeholder="选填：项目上线、紧急修复...">
                </div>
                <button type="submit" class="btn btn-ot" id="ot-submit">保存</button>
            </form>
            <div id="recent-records">
                <div class="section-title" style="margin-top: 20px">最近加班</div>
                <div id="recent-list"></div>
            </div>
        </section>

        <section id="view-reconcile" class="view">
            <div id="reconcile-container">
                <div class="card">
                    <div id="reconcile-inventory"></div>
                    <div class="divider"></div>
                    <form id="off-form">
                        <div class="form-group">
                            <label class="form-label" for="off-date">调休日期</label>
                            <input type="date" id="off-date" class="form-input" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="off-start">开始时间</label>
                                <input type="time" id="off-start" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="off-end">结束时间</label>
                                <input type="time" id="off-end" class="form-input" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-leave" id="off-submit">预览核销</button>
                    </form>
                </div>
            </div>
        </section>

        <section id="view-list" class="view">
            <div id="record-list-full"></div>
        </section>

        <section id="view-stats" class="view">
            <div id="stats-container"></div>
        </section>
    </main>

    <nav id="tab-bar">
        <button class="tab active" data-tab="add">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v12m6-6H6"/></svg>
            记加班
        </button>
        <button class="tab" data-tab="reconcile">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            记调休
        </button>
        <button class="tab" data-tab="list">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            记录
        </button>
        <button class="tab" data-tab="stats">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            统计
        </button>
    </nav>
</div>

<div id="toast" class="toast"></div>

<div id="preview-modal" class="modal-overlay">
    <div class="modal-content">
        <div id="preview-body"></div>
        <div class="divider"></div>
        <div class="modal-footer">
            <button class="btn btn-ghost" id="preview-cancel">取消</button>
            <button class="btn btn-leave" id="preview-confirm">确认核销</button>
        </div>
    </div>
</div>

<script src="api.js"></script>
<script src="app.js"></script>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
            navigator.serviceWorker.register("sw.js").then(function (reg) {
                reg.addEventListener("updatefound", function () {
                    var sw = reg.installing;
                    sw.addEventListener("statechange", function () {
                        if (sw.state === "installed" && navigator.serviceWorker.controller) {
                            var banner = document.createElement("div");
                            banner.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#1c1917;color:#fff;padding:12px;text-align:center;font-size:13px;z-index:100";
                            banner.innerHTML = '应用已更新 <a href="#" onclick="location.reload()" class="" style="text-decoration:underline;margin-left:8px;color:#d6d3d1">点击刷新</a>';
                            document.body.appendChild(banner);
                        }
                    });
                });
            });
        });
        navigator.serviceWorker.addEventListener("message", function (e) {
            if (e.data && e.data.type === "sync" && window.API && API.syncPendingOps) {
                API.syncPendingOps();
            }
        });
    }
    window.addEventListener("online", function () {
        if (window.API && API.syncPendingOps) API.syncPendingOps();
    });
</script>
</body>
</html>
